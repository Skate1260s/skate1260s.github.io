<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiet Blue | My Site</title>
    <style>
        /* This is the CSS - the "makeup" of your site */
        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            /* A soft, liminal blue gradient */
            background: linear-gradient(180deg, #d6e4f0 0%, #ffffff 100%);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #4a5568;
        }

        .container {
            text-align: center;
            padding: 3rem;
            /* A "glassmorphism" effect for that comforting feel */
            background: rgba(255, 255, 255, 0.4);
            backdrop-filter: blur(8px);
            border-radius: 20px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.05);
            max-width: 500px;
            width: 90%;
        }

        h1 {
            font-weight: 300;
            letter-spacing: 2px;
            margin-bottom: 1rem;
            color: #5a7d9a;
        }

        p {
            line-height: 1.6;
            font-size: 1.1rem;
            opacity: 0.8;
        }

        .footer-text {
            position: absolute;
            bottom: 20px;
            font-size: 0.8rem;
            letter-spacing: 1px;
            opacity: 0.5;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Welcome to the Stillness</h1>
        <p>This is a place to breathe. A small corner of the internet that feels like a quiet hallway at 3:00 AM.</p>
        <p><i>More content coming soon...</i></p>
    </div>

    <div class="footer-text">est. 2026</div>

</body>
</html>
